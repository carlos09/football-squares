<app-header></app-header>
<div class="mx-auto p-4 bg-[var(--tw-color-tan)]">
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-9">
            <div
                class="bg-white shadow-lg rounded-2xl border border-gray-200 w-full p-6"
            >
                <app-game-grid
                    [xAxisNumbers]="(axisNumbers$ | async).xAxis"
                    [yAxisNumbers]="(axisNumbers$ | async).yAxis"
                    [generated]="(numbersGenerated$ | async) ?? false"
                    [selectedSquares]="(selectedSquares$ | async) ?? []"
                    [takenSquares]="(gameUserSelections$ | async) ?? []"
                    (selectionChanged)="updateSelectedCount($event)"
                ></app-game-grid>

                <div class="p-4 flex gap-4">
                    <button
                        *ngIf="!(numbersGenerated$ | async)"
                        (click)="finishSelection()"
                        [disabled]="!(hasChanges$ | async)"
                        class="px-4 py-2 bg-green-600 text-white rounded-md"
                    >
                        Save Selections ({{
                            (selectedSquares$ | async)?.length || 0
                        }})
                    </button>

                    <button
                        (click)="generateAxisNumbers()"
                        class="px-4 py-2 bg-green-500 text-white rounded"
                    >
                        Generate Numbers
                    </button>
                    <button
                        (click)="startGame()"
                        class="px-4 py-2 bg-green-500 text-white rounded"
                    >
                        Start Game
                    </button>
                </div>
            </div>
        </div>
        <div class="col-span-3 flex flex-col gap-4">
            <app-game-settings
                (gameSettings)="gameSettingsSave($event)"
            ></app-game-settings>
            <app-game-players></app-game-players>
            <app-game-scoring></app-game-scoring>
        </div>
    </div>
</div>
