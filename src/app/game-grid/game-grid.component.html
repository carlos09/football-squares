<h1 class="text-3xl font-bold underline mb-4">
    Hello world!3
</h1>

<div class="@container flex flex-col items-center">
    <!-- Grid Container -->
    <div class="grid">
        <div 
            class="grid-item flex items-center justify-center cursor-pointer transition"
            *ngFor="let num of numbers"
            (click)="toggleSquare(num)"
            [class.bg-blue-500]="selectedSquares.has(num)"
        >
            {{ num }}
        </div>
    </div>
</div>
