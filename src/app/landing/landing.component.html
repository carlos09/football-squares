<main class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white shadow-lg rounded-lg p-6">
        <h1 *ngIf="!(user$ | async); else loggedIn" class="text-xl font-bold">
            Welcome to the Game
        </h1>

        <ng-template #loggedIn>
            <h1 class="text-xl font-bold">Welcome back, {{ user$ | async }}</h1>
        </ng-template>

        <button
            (click)="createGame()"
            class="px-8 py-2 text-[17px] text-white bg-[dodgerblue] border-transparent rounded-md shadow-[2px_2px_4px_rgba(0,0,0,0.4)] transition-all duration-200 ease-in-out hover:bg-gradient-to-r hover:from-[rgba(30,144,255,1)] hover:to-[rgba(0,212,255,1)] active:translate-y-1"
        >
            Start a New Game
        </button>
        <button
            *ngIf="!(isAuthenticated$ | async)"
            (click)="login()"
            class="px-8 py-2 text-[17px] text-white bg-[dodgerblue] border-transparent rounded-md shadow-[2px_2px_4px_rgba(0,0,0,0.4)] transition-all duration-200 ease-in-out hover:bg-gradient-to-r hover:from-[rgba(30,144,255,1)] hover:to-[rgba(0,212,255,1)] active:translate-y-1"
        >
            Login
        </button>
        <button (click)="clearLocalStorage()">Clear Local Storage</button>
    </div>

    <div *ngIf="games$ | async as games">
        <h2>Your Games</h2>
        <ul>
            <li *ngFor="let game of games">
                <a (click)="navigateToGame(game.gameCode)">{{
                    game.gameCode
                }}</a>
            </li>
        </ul>
    </div>
</main>
